name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/opt/eigene-rp-seite"
          overwrite: true

      - name: Install and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/eigene-rp-seite
            npm ci --omit=dev
            npm rebuild better-sqlite3 --build-from-source

            if pm2 describe rp-chat >/dev/null 2>&1; then
              pm2 restart rp-chat --update-env
            else
              pm2 start src/index.js --name rp-chat --interpreter /usr/bin/node
            fi

            pm2 save
