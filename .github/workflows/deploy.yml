name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/opt/eigene-rp-seite"
          overwrite: true

      - name: Install and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/eigene-rp-seite
            export PATH="/usr/bin:/bin:${PATH}"
            export npm_config_build_from_source=true
            export npm_config_nodedir=/usr
            /usr/bin/node /usr/bin/npm ci --omit=dev --foreground-scripts
            /usr/bin/node /usr/bin/npm rebuild better-sqlite3 --build-from-source --foreground-scripts

            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "$PM2_BIN" ] && [ -x /usr/local/bin/pm2 ]; then
              PM2_BIN="/usr/local/bin/pm2"
            fi
            if [ -z "$PM2_BIN" ]; then
              /usr/bin/npm i -g pm2
              PM2_BIN="$(command -v pm2 || true)"
            fi
            if [ -z "$PM2_BIN" ] && [ -x /usr/local/bin/pm2 ]; then
              PM2_BIN="/usr/local/bin/pm2"
            fi
            if [ -z "$PM2_BIN" ]; then
              echo "pm2 not found after install"
              exit 1
            fi

            "$PM2_BIN" delete rp-chat || true
            "$PM2_BIN" start src/index.js --name rp-chat --interpreter /usr/bin/node
            "$PM2_BIN" save
