name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/opt/eigene-rp-seite"
          overwrite: true

      - name: Install and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/eigene-rp-seite
            export PATH="/usr/bin:/bin:${PATH}"

            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "$PM2_BIN" ] && [ -x /usr/local/bin/pm2 ]; then
              PM2_BIN="/usr/local/bin/pm2"
            fi
            if [ -z "$PM2_BIN" ]; then
              /usr/bin/npm i -g pm2
              PM2_BIN="$(command -v pm2 || true)"
            fi
            if [ -z "$PM2_BIN" ] && [ -x /usr/local/bin/pm2 ]; then
              PM2_BIN="/usr/local/bin/pm2"
            fi
            if [ -z "$PM2_BIN" ]; then
              echo "pm2 not found after install"
              exit 1
            fi

            "$PM2_BIN" delete rp-chat || true

            install_app() {
              rm -rf node_modules
              rm -rf /root/.cache/node-gyp/18.19.1 || true
              export npm_config_build_from_source=true
              export npm_config_nodedir=/usr
              export npm_config_jobs=1
              /usr/bin/node /usr/bin/npm ci --omit=dev --foreground-scripts
              /usr/bin/node /usr/bin/npm rebuild better-sqlite3 --build-from-source --foreground-scripts
            }

            ATTEMPT=1
            MAX_ATTEMPTS=3
            until install_app; do
              if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                echo "npm ci failed after ${MAX_ATTEMPTS} attempts"
                exit 1
              fi
              ATTEMPT=$((ATTEMPT + 1))
              echo "npm ci failed, retrying (${ATTEMPT}/${MAX_ATTEMPTS})..."
              rm -rf node_modules
              /usr/bin/npm cache verify || true
              sleep 2
            done

            /usr/bin/node -e "console.log('ABI', process.versions.modules); require('better-sqlite3'); console.log('better-sqlite3 ok')"

            "$PM2_BIN" delete rp-chat || true
            "$PM2_BIN" start src/index.js --name rp-chat --cwd /opt/eigene-rp-seite --interpreter /usr/bin/node
            "$PM2_BIN" save

            sleep 3
            APP_STATUS="$("$PM2_BIN" jlist | /usr/bin/node -e "let raw='';process.stdin.on('data',c=>raw+=c);process.stdin.on('end',()=>{const list=JSON.parse(raw||'[]');const app=list.find((item)=>item.name==='rp-chat');process.stdout.write(app?.pm2_env?.status || 'missing');});")"
            if [ "$APP_STATUS" != "online" ]; then
              echo "rp-chat status is $APP_STATUS"
              "$PM2_BIN" logs rp-chat --lines 80 --nostream || true
              exit 1
            fi
